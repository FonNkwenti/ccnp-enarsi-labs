hostname R1
no ip domain-lookup
!
! ─── Underlay ───────────────────────────────────────────────────────────────
interface GigabitEthernet0/0
 description Underlay-to-R4-ISP
 ip address 203.0.113.1 255.255.255.252
 no shutdown
!
interface Loopback0
 description LAN-Segment
 ip address 10.1.1.1 255.255.255.0
 no shutdown
!
ip route 0.0.0.0 0.0.0.0 203.0.113.2
!
! ─── IKEv1 / IPsec ──────────────────────────────────────────────────────────
crypto isakmp policy 10
 encr aes 256
 hash sha256
 authentication pre-share
 group 14
 lifetime 86400
!
crypto isakmp key cisco123 address 0.0.0.0 0.0.0.0
!
crypto ipsec transform-set DMVPN-TS esp-aes 256 esp-sha256-hmac
 mode transport
!
crypto ipsec profile DMVPN-PROFILE
 set transform-set DMVPN-TS
!
! ─── mGRE Tunnel (DMVPN Hub) — Phase 3 additions ───────────────────────────
interface Tunnel0
 description DMVPN-Hub-NHS-Phase3
 bandwidth 1000
 ip address 10.100.0.1 255.255.255.0
 no ip redirects
 ip mtu 1400
 ip tcp adjust-mss 1360
 ip nhrp authentication ENARSI
 ip nhrp map multicast dynamic
 ip nhrp network-id 100
 ip nhrp hold-time 300
 ip nhrp redirect
 ip ospf network point-to-multipoint
 ip ospf 100 area 0
 tunnel source GigabitEthernet0/0
 tunnel mode gre multipoint
 tunnel key 100
 tunnel protection ipsec profile DMVPN-PROFILE
 no shutdown
!
! ─── OSPF overlay ───────────────────────────────────────────────────────────
router ospf 100
 router-id 10.1.1.1
 passive-interface default
 no passive-interface Tunnel0
 network 10.1.1.0 0.0.0.255 area 0
 network 10.100.0.0 0.0.0.255 area 0
!
end
