hostname R4
no ip domain-lookup
!
! R4 is the simulated ISP/transit node.
! Unchanged from lab-00 — R4 has no DMVPN, IPsec, or routing protocol config.
!
interface GigabitEthernet0/0
 description Underlay-to-R1-Hub
 ip address 203.0.113.2 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/1
 description Underlay-to-R2-Spoke1
 ip address 198.51.100.2 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/2
 description Underlay-to-R3-Spoke2
 ip address 192.0.2.2 255.255.255.252
 no shutdown
!
interface Loopback0
 ip address 4.4.4.4 255.255.255.255
 no shutdown
!
end
