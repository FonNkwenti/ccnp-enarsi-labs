hostname R3
no ip domain-lookup
!
! ─── Underlay ───────────────────────────────────────────────────────────────
interface GigabitEthernet0/0
 description Underlay-to-R4-ISP
 ip address 192.0.2.1 255.255.255.252
 no shutdown
!
interface Loopback0
 description LAN-Segment
 ip address 10.3.3.3 255.255.255.0
 no shutdown
!
ip route 0.0.0.0 0.0.0.0 192.0.2.2
!
! ─── mGRE Tunnel (DMVPN Spoke 2 — Branch B) ────────────────────────────────
interface Tunnel0
 description DMVPN-Spoke2-BranchB
 bandwidth 1000
 ip address 10.100.0.3 255.255.255.0
 ip mtu 1400
 ip tcp adjust-mss 1360
 ip nhrp authentication ENARSI
 ip nhrp map 10.100.0.1 203.0.113.1
 ip nhrp map multicast 203.0.113.1
 ip nhrp network-id 100
 ip nhrp nhs 10.100.0.1
 ip ospf network point-to-multipoint
 ip ospf 100 area 0
 tunnel source GigabitEthernet0/0
 tunnel mode gre multipoint
 tunnel key 100
 no shutdown
!
! ─── OSPF overlay ───────────────────────────────────────────────────────────
router ospf 100
 router-id 10.3.3.3
 passive-interface default
 no passive-interface Tunnel0
 network 10.3.3.0 0.0.0.255 area 0
 network 10.100.0.0 0.0.0.255 area 0
!
end
